<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonu Work Anniversary Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f9fbff;
      --bg-2: #eef3ff;
      --bg-3: #fff8ef;
      --card: rgba(255, 255, 255, 0.9);
      --text: #12203d;
      --muted: #5b6780;
      --accent: #2f6fed;
      --accent-2: #ea580c;
      --line: rgba(18, 32, 61, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #d6e7ff 0%, transparent 36%),
        radial-gradient(circle at 90% 86%, #ffe1b4 0%, transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 58%, var(--bg-3));
      display: grid;
      place-items: center;
      padding: 22px 14px;
      overflow-x: hidden;
    }

    .wrap {
      width: min(960px, 100%);
      display: grid;
      gap: 14px;
      animation: rise 700ms ease-out;
    }

    .topline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .title {
      margin: 0;
      font-family: "Archivo Black", sans-serif;
      font-size: clamp(1.8rem, 3.9vw, 3rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
      text-wrap: balance;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.8vw, 1.08rem);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(15, 24, 45, 0.1);
      backdrop-filter: blur(6px);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: clamp(1.12rem, 2.4vw, 1.36rem);
      letter-spacing: 0.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .pill {
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      background: #fff;
      border: 1px solid var(--line);
    }

    .value {
      display: block;
      font-weight: 700;
      font-size: clamp(1.35rem, 3.5vw, 1.9rem);
      color: var(--accent);
    }

    .label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.84rem;
      letter-spacing: 0.02em;
    }

    .countdown-box {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .count-item {
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
      background: #f4f7ff;
      border: 1px solid #dbe4ff;
    }

    .count-item .value {
      color: #2a4a93;
    }

    .foot {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .anniv-date {
      display: inline-block;
      margin-left: 6px;
      color: var(--accent-2);
      font-weight: 600;
    }

    .status {
      margin: 8px 0 0;
      font-size: 0.92rem;
      color: #31405f;
      min-height: 22px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 15px rgba(13, 28, 56, 0.14);
    }

    .btn-copy {
      background: #ffffff;
      color: #1f2f4f;
      border-color: var(--line);
    }

    .btn-share {
      background: var(--accent);
      color: #ffffff;
    }

    @media (max-width: 680px) {
      body {
        padding: 12px 10px;
      }

      .wrap {
        gap: 10px;
      }

      .card {
        padding: 14px;
        border-radius: 14px;
      }

      .grid,
      .countdown-box {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .pill,
      .count-item {
        padding: 12px 8px;
      }

      .label {
        font-size: 0.84rem;
      }

      .foot {
        margin-top: 8px;
        font-size: 0.86rem;
        line-height: 1.35;
      }

      .action-row {
        gap: 8px;
      }

      .btn {
        flex: 1;
        min-width: 0;
        padding: 10px 12px;
      }
    }

    @media (max-width: 420px) {
      .title {
        font-size: 1.55rem;
      }

      .sub {
        font-size: 0.92rem;
      }

      .card h2 {
        font-size: 1.05rem;
      }

      .grid,
      .countdown-box {
        grid-template-columns: 1fr;
      }

      .value {
        font-size: 1.55rem;
      }

      .anniv-date {
        margin-left: 0;
        display: block;
        margin-top: 4px;
      }

      .topline {
        font-size: 0.72rem;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="card">
      <p class="topline"><span class="dot" aria-hidden="true"></span> Work Anniversary Tracker</p>
      <h1 class="title">Sonu Wipro Work Anniversary Counter</h1>
      <p class="sub">Joined on 11 April 2022</p>
    </header>

    <section class="card" aria-live="polite">
      <h2>Time Passed Since Joining</h2>
      <div class="grid">
        <div class="pill">
          <span id="years" class="value">0</span>
          <span class="label">Years</span>
        </div>
        <div class="pill">
          <span id="months" class="value">0</span>
          <span class="label">Months</span>
        </div>
        <div class="pill">
          <span id="days" class="value">0</span>
          <span class="label">Days</span>
        </div>
      </div>
    </section>

    <section class="card" aria-live="polite">
      <h2>Next Anniversary Countdown</h2>
      <div class="countdown-box">
        <div class="count-item">
          <span id="cd-days" class="value">0</span>
          <span class="label">Days</span>
        </div>
        <div class="count-item">
          <span id="cd-hours" class="value">0</span>
          <span class="label">Hours</span>
        </div>
        <div class="count-item">
          <span id="cd-minutes" class="value">0</span>
          <span class="label">Minutes</span>
        </div>
        <div class="count-item">
          <span id="cd-seconds" class="value">0</span>
          <span class="label">Seconds</span>
        </div>
      </div>
      <p class="foot">
        Next anniversary date:
        <span id="next-date" class="anniv-date">-</span>
      </p>
      <p id="status" class="status"></p>
      <div class="action-row">
        <button id="copyLink" class="btn btn-copy" type="button">Copy Page Link</button>
        <button id="shareLink" class="btn btn-share" type="button">Share</button>
      </div>
    </section>
  </main>

  <script>
    const joinDate = new Date(2022, 3, 11); // 11 April 2022
    const statusEl = document.getElementById("status");

    function daysInMonth(year, monthIndex) {
      return new Date(year, monthIndex + 1, 0).getDate();
    }

    function addMonthsKeepingDate(baseDate, monthsToAdd) {
      const year = baseDate.getFullYear();
      const month = baseDate.getMonth();
      const day = baseDate.getDate();
      const targetMonthIndex = month + monthsToAdd;
      const targetYear = year + Math.floor(targetMonthIndex / 12);
      const normalizedMonth = ((targetMonthIndex % 12) + 12) % 12;
      const cappedDay = Math.min(day, daysInMonth(targetYear, normalizedMonth));
      return new Date(targetYear, normalizedMonth, cappedDay);
    }

    function diffYearsMonthsDays(startDate, endDate) {
      let years = endDate.getFullYear() - startDate.getFullYear();
      let anchor = new Date(startDate.getFullYear() + years, startDate.getMonth(), startDate.getDate());

      if (anchor > endDate) {
        years -= 1;
        anchor = new Date(startDate.getFullYear() + years, startDate.getMonth(), startDate.getDate());
      }

      let months = 0;
      while (months < 12) {
        const nextAnchor = addMonthsKeepingDate(anchor, 1);
        if (nextAnchor <= endDate) {
          months += 1;
          anchor = nextAnchor;
        } else {
          break;
        }
      }

      const msPerDay = 24 * 60 * 60 * 1000;
      const days = Math.floor((endDate - anchor) / msPerDay);

      return { years, months, days };
    }

    function getUpcomingAnniversary(now) {
      let target = new Date(now.getFullYear(), joinDate.getMonth(), joinDate.getDate(), 0, 0, 0, 0);
      if (now >= target) {
        target = new Date(now.getFullYear() + 1, joinDate.getMonth(), joinDate.getDate(), 0, 0, 0, 0);
      }
      return target;
    }

    function formatDate(date) {
      return date.toLocaleDateString(undefined, {
        day: "2-digit",
        month: "long",
        year: "numeric"
      });
    }

    function updateCounter() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const elapsed = diffYearsMonthsDays(joinDate, today);

      document.getElementById("years").textContent = String(elapsed.years);
      document.getElementById("months").textContent = String(elapsed.months);
      document.getElementById("days").textContent = String(elapsed.days);

      const target = getUpcomingAnniversary(now);
      document.getElementById("next-date").textContent = formatDate(target);

      const distance = target.getTime() - now.getTime();
      const totalSeconds = Math.max(0, Math.floor(distance / 1000));
      const cdDays = Math.floor(totalSeconds / 86400);
      const cdHours = Math.floor((totalSeconds % 86400) / 3600);
      const cdMinutes = Math.floor((totalSeconds % 3600) / 60);
      const cdSeconds = totalSeconds % 60;

      document.getElementById("cd-days").textContent = String(cdDays);
      document.getElementById("cd-hours").textContent = String(cdHours).padStart(2, "0");
      document.getElementById("cd-minutes").textContent = String(cdMinutes).padStart(2, "0");
      document.getElementById("cd-seconds").textContent = String(cdSeconds).padStart(2, "0");

      if (now.getMonth() === joinDate.getMonth() && now.getDate() === joinDate.getDate()) {
        statusEl.textContent = "Happy Work Anniversary, Sonu!";
      } else {
        statusEl.textContent = `Completed ${elapsed.years} years at Wipro.`;
      }
    }

    function startTicker() {
      updateCounter();

      // Keep updates aligned to wall-clock seconds to avoid drift.
      const msToNextSecond = 1000 - (Date.now() % 1000);
      setTimeout(startTicker, msToNextSecond);
    }

    function fallbackCopy(text) {
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      try {
        document.execCommand("copy");
        statusEl.textContent = "Page link copied to clipboard.";
      } catch (error) {
        statusEl.textContent = "Unable to copy link on this browser.";
      }
      document.body.removeChild(temp);
    }

    document.getElementById("copyLink").addEventListener("click", function () {
      const url = window.location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function () {
          statusEl.textContent = "Page link copied to clipboard.";
        }).catch(function () {
          fallbackCopy(url);
        });
        return;
      }
      fallbackCopy(url);
    });

    document.getElementById("shareLink").addEventListener("click", function () {
      if (!navigator.share) {
        statusEl.textContent = "Share is not supported. Copy the link instead.";
        return;
      }

      navigator.share({
        title: "Sonu Wipro Work Anniversary Counter",
        text: "Live work anniversary and countdown tracker.",
        url: window.location.href
      }).then(function () {
        statusEl.textContent = "Shared successfully.";
      }).catch(function (error) {
        if (error && error.name !== "AbortError") {
          statusEl.textContent = "Sharing failed. Try copying the link.";
        }
      });
    });

    startTicker();
  </script>
</body>
</html>
