<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="main-theme">
    <div class="main-bg" aria-hidden="true"></div>

    <div class="container main-shell">
        <div class="header-copy">
            <p class="eyebrow">Personal Link Generator</p>
            <h1>Birthday Countdown</h1>
            <p class="subline">Create and share a live countdown page in seconds.</p>
        </div>

        <div id="formContainer" class="input-panel">
            <div class="field">
                <label for="personName">Person Name</label>
                <input type="text" id="personName" placeholder="Enter full name" autocomplete="name">
            </div>
            <div class="field-grid">
                <div class="field">
                    <label for="birthMonth">Birth Month</label>
                    <input type="number" id="birthMonth" min="1" max="12" placeholder="1-12" inputmode="numeric">
                </div>
                <div class="field">
                    <label for="birthDay">Birth Day</label>
                    <input type="number" id="birthDay" min="1" max="31" placeholder="1-31" inputmode="numeric">
                </div>
            </div>
            <button id="generateButton" type="button" onclick="generateCountdownLink()">Generate Countdown Link</button>
        </div>

        <div id="countdownGrid" class="countdown-grid" aria-live="polite"></div>
        <div id="result" class="result"></div>

        <div class="action-row">
            <button id="copyButton" type="button" style="display:none;" onclick="copyToClipboard()">Copy URL</button>
            <button id="shareButton" type="button" style="display:none;" onclick="shareLink()">Share</button>
        </div>
    </div>

    <h3>Built by <a href="https://singlebucks.blogspot.com" target="_blank" rel="noopener noreferrer">Sonu Kushwaha</a></h3>

    <script src="./app.js"></script>
</body>

</html>
